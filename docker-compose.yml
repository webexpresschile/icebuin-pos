version: "3.8"

# Para desarrollo local
# En producción: Frontend → Vercel | Backend → Railway | MongoDB → Atlas

services:
  mongodb:
    image: mongo:7
    container_name: icebuin-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: icebuin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: icebuinpos
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: icebuin-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://icebuin:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/icebuinpos?authSource=admin
      DB_NAME: icebuinpos
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: http://localhost:3000,https://icebuinpos.vercel.app

volumes:
  mongo-data:
